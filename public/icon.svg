<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #f7fafa; }
      .primary { fill: #0f766e; }
      .accent { fill: #14b8a6; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #11242b; }
      .primary { fill: #14b8a6; }
      .accent { fill: #0f766e; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="36" />
  
  <!-- Sparkle/shine circle (represents cleanliness) -->
  <g style="transform: translate(90px, 90px)">
    <!-- Main circle with soft glow -->
    <circle cx="0" cy="0" r="48" class="primary" opacity="0.1" />
    
    <!-- Central droplet/sparkle shape -->
    <path class="primary" d="M 0 -28 C -8 -20 -12 -8 -12 0 C -12 13.25 -6.6 22 0 24 C 6.6 22 12 13.25 12 0 C 12 -8 8 -20 0 -28 Z" />
    
    <!-- Left sparkle -->
    <g class="accent">
      <path d="M -24 -8 L -20 -8 L -22 -12 L -22 -4 Z" />
      <path d="M -28 -12 L -24 -8 L -26 -14 Z" />
    </g>
    
    <!-- Right sparkle -->
    <g class="accent">
      <path d="M 24 -8 L 20 -8 L 22 -12 L 22 -4 Z" />
      <path d="M 28 -12 L 24 -8 L 26 -14 Z" />
    </g>
    
    <!-- Bottom sparkle -->
    <g class="accent">
      <path d="M 0 28 L 4 24 L -4 24 Z" />
      <path d="M 0 36 L 6 30 L -6 30 Z" />
    </g>
  </g>
</svg>
